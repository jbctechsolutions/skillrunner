# LiteLLM Configuration for Skillrunner
# This file configures LiteLLM to work with Ollama (via Docker network) and cloud providers

model_list:
  # Local Ollama models (accessed via Docker network)
  - model_name: ollama/deepseek-coder-v2:16b
    litellm_params:
      model: ollama/deepseek-coder-v2:16b
      api_base: http://ollama:11434  # Docker network hostname (internal port)

  - model_name: ollama/qwen2.5-coder:32b
    litellm_params:
      model: ollama/qwen2.5-coder:32b
      api_base: http://ollama:11434

  - model_name: ollama/llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: http://ollama:11434

  # Anthropic models (uses ANTHROPIC_API_KEY from environment)
  - model_name: anthropic/claude-3-5-sonnet-20241022
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022

  - model_name: anthropic/claude-3-opus-20240229
    litellm_params:
      model: anthropic/claude-3-opus-20240229

  - model_name: anthropic/claude-3-haiku-20240307
    litellm_params:
      model: anthropic/claude-3-haiku-20240307

  # OpenAI models (uses OPENAI_API_KEY from environment)
  - model_name: openai/gpt-4
    litellm_params:
      model: gpt-4

  - model_name: openai/gpt-4-turbo
    litellm_params:
      model: gpt-4-turbo

  - model_name: openai/gpt-3.5-turbo
    litellm_params:
      model: gpt-3.5-turbo

  # Google models (uses GOOGLE_API_KEY from environment)
  - model_name: google/gemini-pro
    litellm_params:
      model: gemini/gemini-pro

  - model_name: google/gemini-1.5-pro
    litellm_params:
      model: gemini/gemini-1.5-pro

# General settings
general_settings:
  # Optional: Set a master key for additional security
  # master_key: ${LITELLM_MASTER_KEY:-}

  # Database for cost tracking (SQLite by default)
  database_url: sqlite:///app/data/litellm.db

  # Enable cost tracking
  track_cost_per_model: true

  # Logging
  log_level: INFO

# Router settings (for load balancing if needed)
router_settings:
  # Fallback logic
  fallbacks:
    - ollama/deepseek-coder-v2:16b
    - ollama/qwen2.5-coder:32b
    - anthropic/claude-3-haiku-20240307
